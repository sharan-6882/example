<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advanced Ragdoll Archery</title>

<style>

body{
margin:0;
overflow:hidden;
background:linear-gradient(#87CEEB,#4CAF50);
font-family:sans-serif;
}

canvas{
display:block;
touch-action:none;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:18px;
}

.healthbar{
width:150px;
height:10px;
background:#333;
margin-bottom:5px;
}

.health{
height:100%;
background:red;
}

</style>
</head>

<body>

<div id="ui">

PLAYER
<div class="healthbar"><div id="pbar" class="health"></div></div>

ENEMY
<div class="healthbar"><div id="ebar" class="health"></div></div>

</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

function resize(){
canvas.width = window.innerWidth
canvas.height = window.innerHeight
}
resize()
window.addEventListener("resize",resize)

let gravity = 0.4

class Arrow{

constructor(x,y,vx,vy){
this.x=x
this.y=y
this.vx=vx
this.vy=vy
}

update(){

this.vy += gravity
this.x += this.vx
this.y += this.vy

}

draw(){

ctx.beginPath()
ctx.moveTo(this.x,this.y)
ctx.lineTo(this.x-this.vx*4,this.y-this.vy*4)
ctx.strokeStyle="brown"
ctx.lineWidth=4
ctx.stroke()

}

}

let arrows=[]

class Ragdoll{

constructor(x,color){

this.x=x
this.y=0
this.color=color
this.health=100

}

update(){
this.y = canvas.height-220
}

draw(){

ctx.strokeStyle=this.color
ctx.lineWidth=6

let x=this.x
let y=this.y

// head
ctx.beginPath()
ctx.arc(x,y-20,12,0,Math.PI*2)
ctx.stroke()

// body
ctx.beginPath()
ctx.moveTo(x,y)
ctx.lineTo(x,y+60)
ctx.stroke()

// arms
ctx.beginPath()
ctx.moveTo(x,y+10)
ctx.lineTo(x-30,y+30)

ctx.moveTo(x,y+10)
ctx.lineTo(x+30,y+30)
ctx.stroke()

// legs
ctx.beginPath()
ctx.moveTo(x,y+60)
ctx.lineTo(x-25,y+100)

ctx.moveTo(x,y+60)
ctx.lineTo(x+25,y+100)
ctx.stroke()

}

}

let player = new Ragdoll(150,"blue")
let enemy = new Ragdoll(0,"red")

function updatePositions(){

enemy.x = canvas.width-150

}

let aiming=false
let aimX=0
let aimY=0

function shoot(px,py){

let dx = px-player.x
let dy = py-player.y

let power = 0.16

arrows.push(new Arrow(player.x,player.y,dx*power,dy*power))

}

canvas.addEventListener("mousedown",e=>{
aiming=true
aimX=e.clientX
aimY=e.clientY
})

canvas.addEventListener("mousemove",e=>{
if(aiming){
aimX=e.clientX
aimY=e.clientY
}
})

canvas.addEventListener("mouseup",()=>{
shoot(aimX,aimY)
aiming=false
})

canvas.addEventListener("touchstart",e=>{
aiming=true
let t=e.touches[0]
aimX=t.clientX
aimY=t.clientY
})

canvas.addEventListener("touchmove",e=>{
let t=e.touches[0]
aimX=t.clientX
aimY=t.clientY
})

canvas.addEventListener("touchend",()=>{
shoot(aimX,aimY)
aiming=false
})

function enemyShoot(){

let dx = player.x-enemy.x
let dy = player.y-enemy.y

let power = 0.14

arrows.push(new Arrow(enemy.x,enemy.y,dx*power,dy*power))

}

setInterval(enemyShoot,2000)

function hitCheck(a){

// headshot
if(Math.abs(a.x-enemy.x)<12 && Math.abs(a.y-(enemy.y-20))<12){
enemy.health-=35
return true
}

// body
if(Math.abs(a.x-enemy.x)<25 && Math.abs(a.y-enemy.y)<60){
enemy.health-=15
return true
}

// player body
if(Math.abs(a.x-player.x)<25 && Math.abs(a.y-player.y)<60){
player.health-=15
return true
}

return false

}

function update(){

ctx.clearRect(0,0,canvas.width,canvas.height)

updatePositions()

player.update()
enemy.update()

player.draw()
enemy.draw()

if(aiming){

ctx.beginPath()
ctx.moveTo(player.x,player.y)
ctx.lineTo(aimX,aimY)
ctx.strokeStyle="white"
ctx.lineWidth=2
ctx.stroke()

}

for(let a of arrows){

a.update()
a.draw()

if(hitCheck(a)){
a.y=9999
}

}

document.getElementById("pbar").style.width=player.health+"%"
document.getElementById("ebar").style.width=enemy.health+"%"

if(player.health<=0){
alert("Enemy Wins!")
location.reload()
}

if(enemy.health<=0){
alert("You Win!")
location.reload()
}

requestAnimationFrame(update)

}

update()

</script>

</body>
</html>
