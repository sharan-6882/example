<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro 3D Racing</title>
<style>
body { margin:0; overflow:hidden; background:black; }
#ui{
 position:absolute;
 top:10px;
 left:10px;
 color:white;
 font-family:Arial;
}
#joystick{
 position:absolute;
 bottom:40px;
 left:40px;
 width:120px;
 height:120px;
 border-radius:50%;
 background:rgba(255,255,255,0.2);
}
#stick{
 position:absolute;
 width:60px;
 height:60px;
 border-radius:50%;
 background:white;
 top:30px;
 left:30px;
}
</style>
</head>
<body>

<div id="ui">Lap: <span id="lap">1</span></div>

<div id="joystick"><div id="stick"></div></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.150/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.150/examples/js/loaders/GLTFLoader.js"></script>

<script>
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

let camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

/* Lighting */
let sun = new THREE.DirectionalLight(0xffffff,1);
sun.position.set(10,20,10);
sun.castShadow = true;
scene.add(sun);
scene.add(new THREE.AmbientLight(0x404040));

/* Ground */
let ground = new THREE.Mesh(
 new THREE.PlaneGeometry(500,500),
 new THREE.MeshStandardMaterial({color:0x228B22})
);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

/* City Blocks */
for(let i=0;i<50;i++){
 let b = new THREE.Mesh(
  new THREE.BoxGeometry(5,Math.random()*20+5,5),
  new THREE.MeshStandardMaterial({color:0x888888})
 );
 b.position.set((Math.random()-0.5)*200, b.geometry.parameters.height/2, (Math.random()-0.5)*200);
 b.castShadow = true;
 scene.add(b);
}

/* Load Car Model */
let loader = new THREE.GLTFLoader();
let car;
loader.load(
 'https://threejs.org/examples/models/gltf/Flamingo.glb', // placeholder model
 function(gltf){
  car = gltf.scene;
  car.scale.set(0.02,0.02,0.02);
  car.position.y = 0.2;
  car.traverse(n=>{ if(n.isMesh){ n.castShadow=true; }});
  scene.add(car);
 }
);

/* AI Traffic */
let traffic = [];
for(let i=0;i<5;i++){
 let t = new THREE.Mesh(
  new THREE.BoxGeometry(1,0.5,2),
  new THREE.MeshStandardMaterial({color:0xff0000})
 );
 t.position.set((Math.random()-0.5)*20,0.25,-i*20);
 t.castShadow = true;
 scene.add(t);
 traffic.push(t);
}

/* Rain */
let rainGeo = new THREE.BufferGeometry();
let rainCount = 2000;
let pos = [];
for(let i=0;i<rainCount;i++){
 pos.push((Math.random()-0.5)*400,Math.random()*200,(Math.random()-0.5)*400);
}
rainGeo.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));
let rain = new THREE.Points(rainGeo,new THREE.PointsMaterial({color:0xaaaaaa,size:0.1}));
scene.add(rain);

/* Movement */
let speed=0, drift=0;
let lap=1;

function animate(){
 requestAnimationFrame(animate);

 if(car){
  speed += 0.002;
  speed *= 0.99;

  car.position.z -= speed*5;
  car.position.x += drift;

  // Drift system
  drift *= 0.95;

  // Camera follow cinematic
  camera.position.lerp(
   new THREE.Vector3(car.position.x,3,car.position.z+8),
   0.1
  );
  camera.lookAt(car.position);

  // Traffic AI
  traffic.forEach(t=>{
   t.position.z += 0.5;
   if(t.position.z > car.position.z+10)
    t.position.z = car.position.z-100;

   // Collision
   if(t.position.distanceTo(car.position)<1){
    speed *= -0.3; // crash physics
   }
  });

  // Lap system
  if(car.position.z < -200){
   lap++;
   document.getElementById("lap").innerText=lap;
   car.position.z=0;
  }
 }

 // Rain fall
 rain.geometry.attributes.position.array.forEach((v,i,arr)=>{
  if(i%3==1){
   arr[i]-=0.5;
   if(arr[i]<0) arr[i]=200;
  }
 });
 rain.geometry.attributes.position.needsUpdate=true;

 renderer.render(scene,camera);
}
animate();

/* Mobile Joystick */
let joystick=document.getElementById("joystick");
let stick=document.getElementById("stick");

joystick.addEventListener("touchmove",e=>{
 let rect=joystick.getBoundingClientRect();
 let x=e.touches[0].clientX-rect.left-60;
 drift = x*0.001;
});

window.addEventListener("resize",()=>{
 camera.aspect=innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
